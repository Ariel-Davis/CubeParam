<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cube Projection</title>
  <link rel="stylesheet" href="style.css?v=28">
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="controls-wrapper">
    <div id="sci-keyboard" style="display:none">
      <div class="sk-row">
        <button class="sk-btn" data-insert="\pi" data-offset="0">π</button>
        <button class="sk-btn" data-insert="\e" data-offset="0">e</button>
      </div>
      <div class="sk-row">
        <button class="sk-btn" data-insert="\sin()" data-offset="1">sin</button>
        <button class="sk-btn" data-insert="\cos()" data-offset="1">cos</button>
        <button class="sk-btn" data-insert="\tan()" data-offset="1">tan</button>
      </div>
      <div class="sk-row">
        <button class="sk-btn" data-insert="\sqrt()" data-offset="1">√</button>
        <button class="sk-btn" data-insert="\abs()" data-offset="1">|x|</button>
        <button class="sk-btn" data-insert="^" data-offset="0">^</button>
      </div>
    </div>
    <div id="controls">
      <div id="controls-header">
        <button id="btn-dark">☾</button>
        <button id="btn-toggle-controls" class="active">☰</button>
      </div>
      <div id="controls-body">

        <!-- Submenu navigation -->
        <div id="submenu-nav">
          <button id="btn-sub-view" class="submenu-btn active" title="View">⚙</button>
          <button id="btn-sub-aux"  class="submenu-btn"        title="Auxiliary objects">α</button>
          <button id="btn-sub-disp" class="submenu-btn active" title="Display objects">△</button>
        </div>

        <!-- Undo / redo: always visible -->
        <div class="toggle-group">
          <span class="label"></span>
          <button id="btn-undo" disabled>undo</button>
          <button id="btn-redo" disabled>redo</button>
        </div>

        <!-- View submenu -->
        <div id="sub-view" class="submenu">
          <div class="submenu-header">View</div>
          <div class="toggle-group">
            <span class="label">Anchor</span>
            <button id="btn-u3"  class="active">z Axis</button>
            <button id="btn-diag">Diagonal</button>
          </div>
          <div class="toggle-group">
            <span class="label">Mode</span>
            <button id="btn-modeB" class="active">Compact</button>
            <button id="btn-modeA">Poly</button>
          </div>
          <div class="toggle-group" id="scale-row">
            <input type="range"  id="slider-scale" min="0.25" max="4" step="0.01" value="1">
            <span class="label" id="scale-label">scale =</span>
            <input type="number" id="input-scale"  value="1" step="0.01">
          </div>
          <div class="toggle-group">
            <span class="label">axes</span>
            <button id="btn-axes">show</button>
          </div>
          <div class="toggle-group">
            <span class="label">persp</span>
            <button id="btn-perspective">on</button>
          </div>
          <div class="toggle-group" id="persp-row" style="display:none">
            <input type="range"  id="slider-persp" min="0" max="1" step="0.001" value="0">
            <span class="label" id="persp-label">1/F =</span>
            <input type="number" id="input-persp"  value="0" step="0.001" min="0" max="1">
          </div>
          <div class="toggle-group" id="clip-row" style="display:none">
            <span class="label">clip</span>
            <button id="btn-clip" class="active">behind</button>
          </div>
          <div class="toggle-group" id="scale-nodes-row" style="display:none">
            <span class="label">nodes</span>
            <button id="btn-scale-nodes">scale</button>
          </div>
          <div class="toggle-group" id="scale-segs-row" style="display:none">
            <span class="label">segs</span>
            <button id="btn-scale-segs">scale</button>
          </div>
        </div>

        <!-- Auxiliary objects submenu -->
        <div id="sub-aux" class="submenu" style="display:none">
          <div class="submenu-header">Auxiliary</div>
          <div class="toggle-group">
            <span class="label">const</span>
            <input type="text" id="c-name" class="v-name-input" placeholder="name" autocapitalize="none" autocorrect="off" spellcheck="false">
            <input type="text" id="c-expr" class="expr-input"   placeholder="= expr" autocapitalize="none" autocorrect="off" spellcheck="false">
            <button id="btn-add-const">+</button>
          </div>
          <div id="const-list"></div>
        </div>

        <!-- Display objects submenu -->
        <div id="sub-disp" class="submenu">
          <div class="submenu-header">Display</div>
          <div class="toggle-group">
            <span class="label">vertex</span>
            <input type="text" id="v-name" class="v-name-input" placeholder="name" autocapitalize="none" autocorrect="off" spellcheck="false">
            <input type="text" id="v-a1" class="v-coord" value="0" autocapitalize="none" autocorrect="off" spellcheck="false">
            <input type="text" id="v-a2" class="v-coord" value="0" autocapitalize="none" autocorrect="off" spellcheck="false">
            <input type="text" id="v-a3" class="v-coord" value="0" autocapitalize="none" autocorrect="off" spellcheck="false">
            <button id="v-color-btn" class="color-picker-btn" title="Color" style="background:#4d4d4d"></button>
            <div id="v-color-popover" class="color-popover" style="display:none">
              <div class="color-section-label">Presets</div>
              <div id="v-color-presets" class="color-preset-list"></div>
              <div class="color-section-label">Constants</div>
              <div id="v-color-grid" class="color-const-list"></div>
              <div class="color-custom-wrap">
                <div class="color-custom-btn">Custom…</div>
                <input type="color" id="v-color" class="color-native-overlay" value="#4d4d4d">
              </div>
            </div>
            <input type="number" id="v-radius" class="v-coord" value="5" step="0.5" min="1" title="Node radius">
            <button id="v-add-more" class="v-toggle" title="More options">⋯</button>
            <button id="btn-add-vertex">+</button>
          </div>
          <div class="toggle-group" id="v-add-extra" style="display:none">
            <span class="label"></span>
            <button id="v-add-label"   class="v-toggle" title="New vertices show label">A</button>
            <button id="v-add-visible" class="v-toggle" title="New vertices visible">●</button>
          </div>
          <div id="vertex-list"></div>
          <div class="section-divider"></div>
          <div class="toggle-group">
            <span class="label">create</span>
            <button id="seg-color-btn" class="color-picker-btn" title="Color" style="background:#4d4d4d"></button>
            <div id="seg-color-popover" class="color-popover" style="display:none">
              <div class="color-section-label">Presets</div>
              <div id="seg-color-presets" class="color-preset-list"></div>
              <div class="color-section-label">Constants</div>
              <div id="seg-color-grid" class="color-const-list"></div>
              <div class="color-custom-wrap">
                <div class="color-custom-btn">Custom…</div>
                <input type="color" id="seg-color" class="color-native-overlay" value="#4d4d4d">
              </div>
            </div>
            <input type="number" id="seg-width" value="1.5" step="0.5" min="0.5" title="Line width">
            <button id="seg-add-more" class="v-toggle" title="More options">⋯</button>
            <button id="btn-segment">segment</button>
          </div>
          <div class="toggle-group" id="seg-add-extra" style="display:none">
            <span class="label"></span>
            <button id="seg-add-visible" class="v-toggle" title="New segments visible">●</button>
          </div>
          <div id="segment-list"></div>
          <div class="section-divider"></div>
          <div id="face-list"></div>
        </div>

        <!-- Code submenu -->
        <div id="sub-code" class="submenu" style="display:none">
          <div class="submenu-header">Code</div>
          <div class="code-toolbar">
            <button id="btn-code-sort">Sort</button>
            <button id="btn-code-save">Save</button>
            <button id="btn-code-exit">Exit</button>
            <button id="btn-code-save-exit">Save+Exit</button>
          </div>
          <div class="code-editor-wrap">
            <div id="code-gutter"></div>
            <textarea id="code-textarea" spellcheck="false" autocapitalize="none" autocorrect="off" wrap="off"></textarea>
          </div>
          <div id="code-error-list"></div>
        </div>

        <!-- Interpreter row (placeholder — wired up with Code submenu later) -->
        <div id="interpreter-row">
          <input type="text" id="interpreter-input" class="expr-input" placeholder="define object…" autocapitalize="none" autocorrect="off" spellcheck="false" disabled>
          <button id="btn-sub-code" class="submenu-btn" title="Code">⌨</button>
        </div>

      </div>
    </div>
  </div>

  <script src="main.js?v=46"></script>
</body>
</html>
