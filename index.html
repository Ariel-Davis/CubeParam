<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cube Projection</title>
  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="controls">
    <div id="controls-header">
      <button id="btn-dark">☾</button>
      <button id="btn-toggle-controls" class="active">☰</button>
    </div>
    <div id="controls-body">
      <div class="toggle-group">
        <span class="label">Anchor</span>
        <button id="btn-u3"  class="active">u₃ = z</button>
        <button id="btn-diag">diag = z</button>
      </div>
      <div class="toggle-group">
        <span class="label">Domain</span>
        <button id="btn-modeA" class="active">A — free</button>
        <button id="btn-modeB">B — disk</button>
      </div>
      <div class="toggle-group" id="scale-row">
        <input type="range"  id="slider-scale" min="0.25" max="4" step="0.01" value="1">
        <span class="label" id="scale-label">scale =</span>
        <input type="number" id="input-scale"  value="1" step="0.01">
      </div>
      <div class="toggle-group">
        <span class="label">axes</span>
        <button id="btn-axes" class="active">show</button>
      </div>
      <div class="toggle-group">
        <span class="label">persp</span>
        <button id="btn-perspective">on</button>
      </div>
      <div class="toggle-group" id="persp-row" style="display:none">
        <input type="range"  id="slider-persp" min="0" max="1" step="0.001" value="0">
        <span class="label" id="persp-label">1/F =</span>
        <input type="number" id="input-persp"  value="0" step="0.001" min="0" max="1">
      </div>
      <div class="toggle-group" id="clip-row" style="display:none">
        <span class="label">clip</span>
        <button id="btn-clip" class="active">behind</button>
      </div>
      <div class="toggle-group" id="scale-nodes-row" style="display:none">
        <span class="label">nodes</span>
        <button id="btn-scale-nodes">scale</button>
      </div>
      <div class="toggle-group" id="scale-segs-row" style="display:none">
        <span class="label">segs</span>
        <button id="btn-scale-segs">scale</button>
      </div>
      <div class="section-divider"></div>
      <div class="toggle-group">
        <span class="label"></span>
        <button id="btn-undo" disabled>undo</button>
        <button id="btn-redo" disabled>redo</button>
      </div>
      <div class="section-divider"></div>
      <div class="toggle-group">
        <span class="label">vertex</span>
        <input type="text"   id="v-name" class="v-name-input" placeholder="name">
        <input type="number" id="v-a1" class="v-coord" value="0" step="any">
        <input type="number" id="v-a2" class="v-coord" value="0" step="any">
        <input type="number" id="v-a3" class="v-coord" value="0" step="any">
        <input type="color"  id="v-color" value="#4d4d4d">
        <input type="number" id="v-radius" class="v-coord" value="5" step="0.5" min="1" title="Node radius">
        <button id="btn-add-vertex">+</button>
      </div>
      <div id="vertex-list"></div>
      <div class="section-divider"></div>
      <div class="toggle-group">
        <span class="label">create</span>
        <input type="color"  id="seg-color" value="#4d4d4d">
        <input type="number" id="seg-width" value="1.5" step="0.5" min="0.5" title="Line width">
        <button id="btn-segment">segment</button>
      </div>
      <div id="segment-list"></div>
    </div>
  </div>

  <script src="main.js?v=12"></script>
</body>
</html>
